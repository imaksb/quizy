services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/.venv  # Prevent conflicts with local .venv
      - /app/__pycache__  # Prevent conflicts with local cache
    restart: unless-stopped
    network_mode: host

    # Uncomment if you need a database
    # depends_on:
    #   - db

  db:
    image: postgres:16
    restart: always
    container_name: db_app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "5433:5432"
    volumes:
      - ./db:/var/lib/postgresql/postgres-data

volumes:
   postgres_data: