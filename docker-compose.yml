services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8000"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - ./:/app
      - /app/.venv
      - /app/__pycache__
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_app
    restart: unless-stopped
    ports:
      - "6379:6379"
