repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]

      - id: black
        name: black
        entry: uv run black
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        stages: [manual]
